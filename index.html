<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0b0d10" />
  <title>Compound</title>
  <meta name="description" content="Compound — small reps, compounded. Ahmed's personal life-maxing app." />
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" href="icons/icon-192.png" />
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Compound" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="app">
    <header class="appbar">
      <div class="appbar__left">
        <span class="logo">◆</span>
        <div>
          <div class="appbar__title" id="appTitle">Compound</div>
          <div class="appbar__date"><span class="syncdot" id="syncDot" title="Cloud sync"></span><span id="appDate">—</span></div>
        </div>
      </div>
      <div class="scorering" id="appScore" title="Non-negotiables done today">
        <div class="scorering__in"><span id="scoreNum">0/0</span></div>
      </div>
    </header>

    <main id="view" class="view"><!-- active module renders here --></main>

    <nav class="tabs" id="tabs" aria-label="Sections"><!-- tabs render here --></nav>
  </div>

  <div id="toast" class="toast" role="status" aria-live="polite"></div>

  <script type="module" src="js/app.js"></script>

</html>
